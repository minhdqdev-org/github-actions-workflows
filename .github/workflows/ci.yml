name: CI

on:
  workflow_call:
    inputs:
      dockerfile:
        type: string
        default: "./Dockerfile"
        description: Path to the Dockerfile relative to the repository root.
      dockerfile_target:
        type: string
        default: ""
        description: Build target for multi-stage Dockerfiles.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build, push & notify
    runs-on: [self-hosted, minhdqdev-org, manual]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version & compute tags
        id: tags
        run: |
          # --- resolve version from project metadata, fall back to short SHA ---
          VERSION=""
          if [ -f "package.json" ]; then
            VERSION=$(python3 -c "import json; v=json.load(open('package.json')).get('version'); print(v or '')") || VERSION=""
          fi
          if [ -z "$VERSION" ] && [ -f "pyproject.toml" ]; then
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project'].get('version',''))") || VERSION=""
          fi
          if [ -z "$VERSION" ] && [ -f "Cargo.toml" ]; then
            VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          fi
          [ -n "$VERSION" ] || VERSION="$(git rev-parse --short HEAD)"

          # --- branch-scoped tag strategy ---
          BASE="harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}"
          REF="${{ github.ref }}"
          TAGS=()
          if [ "$REF" = "refs/heads/develop" ]; then
            # DEV: dev-<short_sha>  →  ArgoCD latest strategy, regexp:^dev-.*$
            TAGS+=("${BASE}:dev-$(git rev-parse --short HEAD)")
          elif echo "$REF" | grep -qE "^refs/heads/rc/"; then
            # UAT: <version>-rc.<run_number>  →  ArgoCD semver strategy, regexp:^.*-rc\.[0-9]+$
            TAGS+=("${BASE}:${VERSION}-rc.${{ github.run_number }}")
          elif [ "$REF" = "refs/heads/main" ] || [ "$REF" = "refs/heads/master" ]; then
            # PROD: <version> + latest  →  ArgoCD semver strategy
            TAGS+=("${BASE}:${VERSION}")
            TAGS+=("${BASE}:latest")
          fi

          {
            echo "version=$VERSION"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Pull BuildKit from Harbor's docker-hub proxy-cache (internal, no rate limit)
          # instead of Docker Hub — saves the cold-pod buildkit pull on every job.
          driver-opts: image=harbor.internal.minhdq.dev/docker-hub/moby/buildkit:buildx-stable-1

      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | docker login harbor.internal.minhdq.dev --username "$HARBOR_USERNAME" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.dockerfile_target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
          cache-from: type=registry,ref=harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}:buildcache
          cache-to: type=registry,ref=harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}:buildcache,mode=max

      - name: Summary
        run: echo "### Image published to Harbor :rocket:" >> "$GITHUB_STEP_SUMMARY"

      - name: Send success notification
        continue-on-error: true
        env:
          NOTIHUB_URL: https://notihub.internal.minhdq.dev
          PROJECT_NAME: ${{ github.event.repository.name }}
          WORKFLOW: ${{ github.workflow }}
          RUN_NUMBER: ${{ github.run_number }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          # jq + curl are baked into the runner image — avoids a Node action download.
          MESSAGE=$(printf 'Workflow: %s\nRun #%s on %s\nCommit: %s' \
            "$WORKFLOW" "$RUN_NUMBER" "$REF_NAME" "${GITHUB_SHA:0:7}")
          jq -n \
            --arg traceNo "github-run-${RUN_ID}" \
            --arg origin "$PROJECT_NAME" \
            --arg title "✅ ${PROJECT_NAME} — CI/CD succeeded" \
            --arg message "$MESSAGE" \
            '{traceNo: $traceNo, origin: $origin, level: "success", data: {title: $title, message: $message}}' \
          | curl -fsS -m 10 -X POST "${NOTIHUB_URL%/}/api/v1/notifications/" \
              -H 'Content-Type: application/json' --data-binary @-
