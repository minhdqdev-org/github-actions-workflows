name: Docker CI with notification

on:
  workflow_call:
    inputs:
      tag_types:
        type: string
        default: short_sha
        description: >
          Comma-separated tag types to publish.
          Accepted values: latest, version, short_sha.
          Example: "latest, version, short_sha"
      extra_tags:
        type: string
        default: ""
        description: >
          Comma-separated literal tag names to publish in addition to tag_types.
          Example: "stable, rc1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build, push & notify
    runs-on: [self-hosted, minhdqdev-org, manual]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ -f "package.json" ]; then
            VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          elif [ -f "pyproject.toml" ]; then
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          elif [ -f "Cargo.toml" ]; then
            VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          BASE="harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}"
          TAGS=()

          IFS=',' read -ra TYPES <<< "${{ inputs.tag_types }}"
          for TYPE in "${TYPES[@]}"; do
            TYPE="${TYPE// /}"
            case "$TYPE" in
              latest)    TAGS+=("${BASE}:latest") ;;
              version)   TAGS+=("${BASE}:${{ steps.version.outputs.version }}") ;;
              short_sha) TAGS+=("${BASE}:$(git rev-parse --short HEAD)") ;;
            esac
          done

          IFS=',' read -ra EXTRAS <<< "${{ inputs.extra_tags }}"
          for TAG in "${EXTRAS[@]}"; do
            TAG="${TAG// /}"
            [ -n "$TAG" ] && TAGS+=("${BASE}:${TAG}")
          done

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Log in to Harbor
        run: echo "$HARBOR_PASSWORD" | docker login harbor.internal.minhdq.dev --username "$HARBOR_USERNAME" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}:buildcache
          cache-to: type=registry,ref=harbor.internal.minhdq.dev/minhdqdev/${{ github.event.repository.name }}:buildcache,mode=max

      - name: Summary
        run: echo "### Image published to Harbor :rocket:" >> "$GITHUB_STEP_SUMMARY"

      - name: Send success notification
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          NOTIHUB_URL: https://notihub.internal.minhdq.dev
          PROJECT_NAME: ${{ github.event.repository.name }}
        with:
          script: |
            const url = process.env.NOTIHUB_URL.replace(/\/$/, '') + '/api/v1/notifications/';
            const payload = {
              traceNo: `github-run-${context.runId}`,
              origin: process.env.PROJECT_NAME,
              level: 'success',
              data: {
                title: `✅ ${process.env.PROJECT_NAME} — CI/CD succeeded`,
                message: [
                  `Workflow: ${context.workflow}`,
                  `Run #${context.runNumber} on ${context.ref.split('/').pop()}`,
                  `Commit: ${context.sha.slice(0, 7)}`,
                ].join('\n'),
              },
            };
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
              console.log(`Notification sent (HTTP ${res.status})`);
            } catch (err) {
              core.warning(`Notification failed — ${err}`);
            }
