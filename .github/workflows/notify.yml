name: Notify via NotiHub

on:
  workflow_call:
    inputs:
      project_name:
        required: true
        type: string
        description: "Project name shown in the notification"
      runs_on:
        required: false
        type: string
        default: '["self-hosted", "minhdqdev-org", "manual"]'
    secrets:
      NOTIHUB_URL:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    name: Send NotiHub alert
    runs-on: ${{ fromJson(inputs.runs_on) }}
    steps:
      - name: Send success notification
        uses: actions/github-script@v7
        env:
          NOTIHUB_URL: ${{ secrets.NOTIHUB_URL }}
          PROJECT_NAME: ${{ inputs.project_name }}
        with:
          script: |
            const url = process.env.NOTIHUB_URL.replace(/\/$/, '') + '/api/v1/notifications/';
            const payload = {
              traceNo: `github-run-${context.runId}`,
              origin: process.env.PROJECT_NAME,
              level: 'success',
              data: {
                title: `✅ ${process.env.PROJECT_NAME} — CI/CD succeeded`,
                message: [
                  `Workflow: ${context.workflow}`,
                  `Run #${context.runNumber} on ${context.ref.split('/').pop()}`,
                  `Commit: ${context.sha.slice(0, 7)}`,
                ].join('\n'),
              },
            };
            try {
              const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });
              console.log(`Notification sent (HTTP ${res.status})`);
            } catch (err) {
              core.warning(`Notification failed — ${err}`);
            }
